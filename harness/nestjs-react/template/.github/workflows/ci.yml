name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: "{{PROJECT_NAME}}"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/{{PROJECT_NAME}}?schema=public"
      TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/{{PROJECT_NAME}}?schema=public"
      PORT: 3000
      WEB_PORT: 5174
      COGNITO_USER_POOL_ID: us-east-1_example
      COGNITO_CLIENT_ID: exampleclientid
      JWT_SECRET: dev-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api prisma migrate deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
