# Worktree overlay — used by setup-worktree.sh to isolate each agent's containers
# Loaded with: docker compose -f docker-compose.yml -f docker-compose.worktree.yml up -d

version: "3.9"

services:
  postgres:
    container_name: "{{PROJECT_NAME}}-postgres-${WORKTREE_SUFFIX:-default}"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_worktree:/var/lib/postgresql/data

  redis:
    container_name: "{{PROJECT_NAME}}-redis-${WORKTREE_SUFFIX:-default}"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data_worktree:/data

volumes:
  postgres_data_worktree:
    name: "${COMPOSE_PROJECT_NAME:-{{PROJECT_NAME}}}_${WORKTREE_SUFFIX:-default}_postgres_data"
  redis_data_worktree:
    name: "${COMPOSE_PROJECT_NAME:-{{PROJECT_NAME}}}_${WORKTREE_SUFFIX:-default}_redis_data"
